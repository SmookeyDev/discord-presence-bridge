<!doctype html>
<html>
	<head>
		<title>Discord Presence Bridge</title>
		<meta charset="UTF-8" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<style>
			* {
				box-sizing: border-box;
				margin: 0;
				padding: 0;
			}

			body {
				font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
				font-size: 14px;
				width: 320px;
				background: #1e1f22;
				color: #dbdee1;
			}

			/* Header */
			.header {
				background: linear-gradient(135deg, #5865f2 0%, #7289da 100%);
				padding: 16px;
				display: flex;
				align-items: center;
				gap: 12px;
			}

			.header-icon {
				width: 40px;
				height: 40px;
				background: rgba(255, 255, 255, 0.2);
				border-radius: 12px;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.header-icon svg {
				width: 24px;
				height: 24px;
				fill: white;
			}

			.header-text h1 {
				font-size: 16px;
				font-weight: 600;
				color: white;
				margin-bottom: 2px;
			}

			.header-text span {
				font-size: 12px;
				color: rgba(255, 255, 255, 0.8);
			}

			/* Content */
			.content {
				padding: 16px;
			}

			/* Status indicator */
			.status {
				display: flex;
				align-items: center;
				gap: 8px;
				padding: 10px 12px;
				background: #2b2d31;
				border-radius: 8px;
				margin-bottom: 12px;
			}

			.status-dot {
				width: 10px;
				height: 10px;
				border-radius: 50%;
				flex-shrink: 0;
			}

			.status-dot.connected {
				background: #23a55a;
				box-shadow: 0 0 8px rgba(35, 165, 90, 0.5);
				animation: pulse 2s infinite;
			}

			.status-dot.disconnected {
				background: #f23f43;
			}

			@keyframes pulse {
				0%, 100% { opacity: 1; }
				50% { opacity: 0.6; }
			}

			.status-text {
				font-size: 13px;
				color: #b5bac1;
			}

			.status-text strong {
				color: #dbdee1;
			}

			/* Presence Card */
			.presence-card {
				background: #232428;
				border-radius: 8px;
				overflow: hidden;
			}

			.presence-header {
				padding: 12px;
				border-bottom: 1px solid #1e1f22;
				display: flex;
				align-items: center;
				justify-content: space-between;
			}

			.presence-title {
				font-size: 11px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: #b5bac1;
			}

			.presence-body {
				padding: 12px;
				display: flex;
				gap: 12px;
			}

			.presence-image {
				width: 60px;
				height: 60px;
				border-radius: 8px;
				background: #5865f2;
				display: flex;
				align-items: center;
				justify-content: center;
				flex-shrink: 0;
				position: relative;
			}

			.presence-image img {
				width: 100%;
				height: 100%;
				border-radius: 8px;
				object-fit: cover;
			}

			.presence-image .fallback-icon {
				display: flex;
				align-items: center;
				justify-content: center;
				color: white;
			}

			.presence-image .fallback-icon svg {
				width: 32px;
				height: 32px;
			}

			.presence-image .small-image {
				position: absolute;
				bottom: -4px;
				right: -4px;
				width: 24px;
				height: 24px;
				background: #232428;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				color: #23a55a;
			}

			.presence-image .small-image svg {
				width: 14px;
				height: 14px;
			}

			.presence-info {
				flex: 1;
				min-width: 0;
				display: flex;
				flex-direction: column;
				justify-content: center;
				gap: 2px;
			}

			.presence-name {
				font-size: 14px;
				font-weight: 600;
				color: #ffffff;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.presence-details,
			.presence-state {
				font-size: 13px;
				color: #b5bac1;
				white-space: nowrap;
				overflow: hidden;
				text-overflow: ellipsis;
			}

			.presence-time {
				font-size: 12px;
				color: #949ba4;
				display: flex;
				align-items: center;
				gap: 4px;
				margin-top: 2px;
			}

			.presence-time svg {
				width: 14px;
				height: 14px;
				flex-shrink: 0;
			}

			/* No Presence State */
			.no-presence {
				text-align: center;
				padding: 24px 16px;
			}

			.no-presence-icon {
				width: 48px;
				height: 48px;
				background: #2b2d31;
				border-radius: 50%;
				display: flex;
				align-items: center;
				justify-content: center;
				margin: 0 auto 12px;
				color: #949ba4;
			}

			.no-presence-icon svg {
				width: 24px;
				height: 24px;
			}

			.no-presence h3 {
				font-size: 14px;
				font-weight: 600;
				color: #dbdee1;
				margin-bottom: 4px;
			}

			.no-presence p {
				font-size: 13px;
				color: #949ba4;
			}

			/* Disabled Sites */
			.disabled-sites {
				margin-top: 12px;
			}

			.disabled-sites-header {
				font-size: 11px;
				font-weight: 600;
				text-transform: uppercase;
				letter-spacing: 0.5px;
				color: #949ba4;
				margin-bottom: 8px;
				padding: 0 4px;
			}

			.disabled-sites-list {
				display: flex;
				flex-wrap: wrap;
				gap: 6px;
			}

			.site-chip {
				display: flex;
				align-items: center;
				gap: 6px;
				padding: 6px 10px;
				background: #2b2d31;
				border-radius: 16px;
				border: none;
				cursor: pointer;
				transition: all 0.2s;
				font-family: inherit;
				font-size: 12px;
				color: #b5bac1;
			}

			.site-chip:hover {
				background: #383a40;
			}

			.site-chip img {
				width: 14px;
				height: 14px;
				border-radius: 2px;
			}

			.site-chip.disabled {
				opacity: 0.6;
			}

			.site-chip .chip-icon {
				font-size: 14px;
				margin-left: 2px;
			}

			/* Toggle Button */
			.toggle-btn {
				background: none;
				border: none;
				cursor: pointer;
				padding: 6px;
				border-radius: 4px;
				transition: background 0.2s;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.toggle-btn:hover {
				background: rgba(255, 255, 255, 0.1);
			}

			.toggle-btn svg {
				width: 18px;
				height: 18px;
				color: #b5bac1;
			}

			.toggle-btn.active svg {
				color: #23a55a;
			}

			.toggle-btn.inactive svg {
				color: #f23f43;
			}

			/* Error/Warning States */
			.alert {
				display: flex;
				align-items: flex-start;
				gap: 10px;
				padding: 12px;
				border-radius: 8px;
				margin-bottom: 12px;
			}

			.alert-error {
				background: rgba(242, 63, 67, 0.1);
				border: 1px solid rgba(242, 63, 67, 0.3);
			}

			.alert-warning {
				background: rgba(240, 178, 50, 0.1);
				border: 1px solid rgba(240, 178, 50, 0.3);
			}

			.alert-icon {
				flex-shrink: 0;
				display: flex;
				align-items: center;
				justify-content: center;
			}

			.alert-icon svg {
				width: 20px;
				height: 20px;
			}

			.alert-error .alert-icon {
				color: #f23f43;
			}

			.alert-warning .alert-icon {
				color: #f0b232;
			}

			.alert-content {
				flex: 1;
			}

			.alert-title {
				font-size: 13px;
				font-weight: 600;
				color: #dbdee1;
				margin-bottom: 2px;
			}

			.alert-text {
				font-size: 12px;
				color: #b5bac1;
			}

			.alert-text a {
				color: #00a8fc;
				text-decoration: none;
			}

			.alert-text a:hover {
				text-decoration: underline;
			}

			/* Button */
			.btn {
				display: inline-flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
				padding: 10px 16px;
				background: #5865f2;
				color: white;
				border: none;
				border-radius: 6px;
				font-family: inherit;
				font-size: 14px;
				font-weight: 500;
				cursor: pointer;
				text-decoration: none;
				transition: background 0.2s;
				width: 100%;
			}

			.btn:hover {
				background: #4752c4;
			}

			.btn svg {
				width: 18px;
				height: 18px;
				flex-shrink: 0;
			}

			/* Footer */
			.footer {
				padding: 12px 16px;
				border-top: 1px solid #2b2d31;
				display: flex;
				align-items: center;
				justify-content: center;
				gap: 8px;
			}

			.footer a {
				color: #949ba4;
				text-decoration: none;
				font-size: 12px;
				display: flex;
				align-items: center;
				gap: 4px;
				transition: color 0.2s;
			}

			.footer a:hover {
				color: #dbdee1;
			}

			.footer a svg {
				width: 14px;
				height: 14px;
				fill: currentColor;
			}

			.footer-divider {
				width: 1px;
				height: 12px;
				background: #2b2d31;
			}
		</style>
	</head>
