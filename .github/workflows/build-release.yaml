name: Build & Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-server:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build shared-types
        run: bun run build --filter=@discord-rpc/shared-types

      - name: Build server (Linux x64)
        working-directory: apps/server
        run: bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile ./dist/discord-presence-bridge-linux-x64

      - name: Build server (Windows x64)
        working-directory: apps/server
        run: bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile ./dist/discord-presence-bridge-windows-x64.exe

      - name: Build server (macOS x64)
        working-directory: apps/server
        run: bun build ./src/index.ts --compile --target=bun-darwin-x64 --outfile ./dist/discord-presence-bridge-macos-x64

      - name: Build server (macOS ARM64)
        working-directory: apps/server
        run: bun build ./src/index.ts --compile --target=bun-darwin-arm64 --outfile ./dist/discord-presence-bridge-macos-arm64

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-binaries
          path: |
            apps/server/dist/discord-presence-bridge-*

  build-extension:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build shared-types
        run: bun run build --filter=@discord-rpc/shared-types

      - name: Build extension (Chrome)
        working-directory: apps/extension
        run: bunx wxt build

      - name: Build extension (Firefox)
        working-directory: apps/extension
        run: bunx wxt build -b firefox

      - name: Zip Chrome extension
        working-directory: apps/extension/.output
        run: zip -r chrome-mv3.zip chrome-mv3

      - name: Zip Firefox extension
        working-directory: apps/extension/.output
        run: zip -r firefox-mv2.zip firefox-mv2

      - name: Upload extension artifacts
        uses: actions/upload-artifact@v4
        with:
          name: extension-packages
          path: |
            apps/extension/.output/*.zip

  release:
    needs: [build-server, build-extension]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List artifacts
        run: ls -la artifacts/

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
